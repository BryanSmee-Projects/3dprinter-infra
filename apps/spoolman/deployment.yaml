apiVersion: apps/v1
kind: Deployment
metadata:
  name: spoolman
  namespace: spoolman
  labels:
    app.kubernetes.io/name: spoolman
spec:
  replicas: 1
  strategy:
    # The data lives on a ReadWriteOnce volume, so avoid two pods mounting it at once.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: spoolman
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spoolman
    spec:
      containers:
        - name: spoolman
          image: ghcr.io/donkie/spoolman:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: TZ
              value: America/Los_Angeles
          volumeMounts:
            - name: data
              # Do NOT change this path: it is where Spoolman stores its data.
              mountPath: /home/app/.local/share/spoolman
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: spoolman-data
