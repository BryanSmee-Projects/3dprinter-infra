apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spoolman
  namespace: spoolman
  labels:
    app.kubernetes.io/name: spoolman
spec:
  parentRefs:
    # HTTPS is terminated by a reverse proxy in front of this Gateway,
    # so traffic reaching it is plain HTTP.
    - name: main-gateway
      namespace: traefik
  hostnames:
    - spoolman.smee.ovh
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: spoolman
          port: 8000
