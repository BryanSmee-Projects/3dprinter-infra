apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spoolman
  namespace: spoolman
  labels:
    app.kubernetes.io/name: spoolman
spec:
  parentRefs:
    # Attach to the cluster's shared Gateway. Adjust name/namespace/sectionName
    # to match your environment. HTTPS is terminated by a reverse proxy in front
    # of this Gateway, so we only attach to the HTTP listener here.
    - name: gateway
      namespace: gateway
      sectionName: http
  hostnames:
    - spoolman.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: spoolman
          port: 8000
